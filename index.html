<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- DNS prefetch for CDN assets -->
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Outfit:wght@400;700;900&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- RemixIcons: loaded non-render-blocking via print media trick -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css"
    media="print"
    onload="this.media='all'"
  />
  <noscript>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" />
  </noscript>

  <!-- Preload critical above-the-fold assets to prevent render-blocking image fetching -->
  <link rel="preload" as="image" href="./assets/images/pencil_image.png" />
  <link rel="preload" as="image" href="./doms_logo2.png" />
  <link rel="preload" as="image" href="./assets/images/doms-treehouse.png" />

  <title>DOMS | Reimagine</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
